{% extends "base.html" %}
{% block title %}免費註冊 — 玄機閣{% endblock %}
{% block meta_description %}加入玄機閣，永久保存您的算命紀錄，探索命運的秘密。{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:480px;">
  <div class="text-center mb-4">
    <p class="ornament mb-2">✦ ✦ ✦</p>
    <h1 class="section-title mb-1" style="font-size:2rem;" id="register-page-title">加入玄機閣</h1>
    <p style="color:var(--clr-muted);font-size:0.9rem;">踏上您的命運探索之旅</p>
  </div>

  <div class="mystic-card p-4 p-md-5">
    <form action="{{ url_for('auth.register') }}" method="POST" id="register-form">
      <div class="mb-3">
        <label for="username" class="form-label"><i class="bi bi-person-circle me-1"></i>帳號名稱 <span style="color:#f87171;">*</span></label>
        <input type="text" class="form-control" id="username" name="username"
               placeholder="至少 3 個字元" required minlength="3" autocomplete="username" />
        <small style="color:var(--clr-muted);font-size:0.8rem;">＊日後用於登入，不可更改</small>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label"><i class="bi bi-envelope me-1"></i>電子信箱 <span style="color:#f87171;">*</span></label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="example@mail.com" required autocomplete="email" />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>設定密碼 <span style="color:#f87171;">*</span></label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="至少 6 個字元" required minlength="6" autocomplete="new-password" />
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-gold py-2" id="register-submit-btn">
          <i class="bi bi-person-check me-2"></i>立即免費註冊
        </button>
      </div>
    </form>

    <hr style="border-color:var(--clr-border);margin:1.5rem 0;">
    <p class="text-center mb-0" style="color:var(--clr-muted);font-size:0.9rem;">
      已有帳號？
      <a href="{{ url_for('auth.login') }}" style="color:var(--clr-purple-lt);" id="goto-login-link">返回登入</a>
    </p>
  </div>
</div>
{% endblock %}
